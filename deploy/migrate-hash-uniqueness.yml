# One-time DB migration: change UNIQUE(hash) to UNIQUE(hash, listing_key) so
# the same ad listed on multiple platforms (e.g. auto24.ee + mototehnika.ee
# share ad IDs) can be tracked independently per channel.
#
# SQLite doesn't allow DROP CONSTRAINT, so we recreate the table with the new
# constraint and copy data.
#
# Run ONCE before deploying the multi-platform code:
#
#   cd deploy
#   ansible-playbook migrate-hash-uniqueness.yml                  # for real
#   ansible-playbook migrate-hash-uniqueness.yml -e dry_run=true  # preview
#
# Idempotent: skips if the table already has the new constraint shape.

- name: One-time DB migration — UNIQUE(hash) → UNIQUE(hash, listing_key)
  hosts: all
  become: true
  vars:
    app_dir: /opt/discord-scraper
    app_user: discord-scraper
    db_path: "{{ app_dir }}/data/scraper.db"
    dry_run: false

  tasks:
    - name: Stop scrape timer
      ansible.builtin.systemd:
        name: discord-scraper.timer
        state: stopped

    - name: Inspect current ads-table schema
      become_user: "{{ app_user }}"
      ansible.builtin.command:
        cmd: sqlite3 {{ db_path }} ".schema ads"
      register: pre_schema
      changed_when: false

    - name: Show current schema
      ansible.builtin.debug:
        var: pre_schema.stdout_lines

    - name: Already-migrated check
      ansible.builtin.set_fact:
        already_migrated: "{{ 'UNIQUE(hash, listing_key)' in pre_schema.stdout or 'UNIQUE (hash, listing_key)' in pre_schema.stdout }}"

    - name: Skip rest if already migrated
      ansible.builtin.debug:
        msg: "Schema already has UNIQUE(hash, listing_key) — nothing to do."
      when: already_migrated

    - name: Run table recreate (drop UNIQUE on hash; add UNIQUE(hash, listing_key))
      become_user: "{{ app_user }}"
      ansible.builtin.shell: |
        sqlite3 {{ db_path }} <<'SQL'
        BEGIN TRANSACTION;
        CREATE TABLE ads_new (
          id                       INTEGER PRIMARY KEY AUTOINCREMENT,
          listing_key              TEXT,
          ad_slug                  TEXT NOT NULL,
          ad_url                   TEXT NOT NULL,
          hash                     TEXT NOT NULL,
          make                     TEXT,
          model                    TEXT,
          year                     INTEGER,
          engine_cc                INTEGER,
          price_eur                REAL,
          price_display            TEXT,
          location                 TEXT,
          description              TEXT,
          date_posted              TEXT,
          mileage_km               INTEGER,
          photo_urls               TEXT,
          local_image_paths        TEXT,
          first_seen_at            TEXT NOT NULL,
          last_seen_at             TEXT NOT NULL,
          last_seen_in_listing_at  TEXT,
          notified_at              TEXT NOT NULL,
          notification_kind        TEXT,
          discord_message_id       TEXT,
          gone_notified_at         TEXT,
          UNIQUE(hash, listing_key)
        );
        INSERT INTO ads_new
          SELECT id, listing_key, ad_slug, ad_url, hash, make, model, year,
                 engine_cc, price_eur, price_display, location, description,
                 date_posted, mileage_km, photo_urls, local_image_paths,
                 first_seen_at, last_seen_at, last_seen_in_listing_at,
                 notified_at, notification_kind, discord_message_id,
                 gone_notified_at
          FROM ads;
        DROP TABLE ads;
        ALTER TABLE ads_new RENAME TO ads;
        CREATE INDEX IF NOT EXISTS idx_ads_slug ON ads(ad_slug);
        CREATE INDEX IF NOT EXISTS idx_ads_listing ON ads(listing_key);
        COMMIT;
        SQL
      when:
        - not already_migrated
        - not dry_run

    - name: Inspect post-migration schema
      become_user: "{{ app_user }}"
      ansible.builtin.command:
        cmd: sqlite3 {{ db_path }} ".schema ads"
      register: post_schema
      changed_when: false

    - name: Show post-migration schema
      ansible.builtin.debug:
        var: post_schema.stdout_lines

    - name: Verify row count preserved
      become_user: "{{ app_user }}"
      ansible.builtin.command:
        cmd: sqlite3 {{ db_path }} "SELECT COUNT(*) FROM ads;"
      register: row_count
      changed_when: false

    - name: Row count
      ansible.builtin.debug:
        msg: "Total rows after migration: {{ row_count.stdout }}"

    - name: Restart scrape timer
      ansible.builtin.systemd:
        name: discord-scraper.timer
        state: started
