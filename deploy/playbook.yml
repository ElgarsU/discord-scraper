- name: Deploy discord-scraper
  hosts: all
  become: true
  vars:
    app_dir: /opt/discord-scraper
    app_user: discord-scraper
    repo_src: "{{ playbook_dir }}/.."
  vars_files:
    - secrets.yml

  tasks:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - rsync
          - sqlite3
        state: present
        update_cache: true

    - name: Set system timezone to Europe/Riga
      community.general.timezone:
        name: Europe/Riga

    - name: Ensure app user exists
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ app_dir }}"
        create_home: true

    - name: Sync app source
      ansible.posix.synchronize:
        src: "{{ repo_src }}/"
        dest: "{{ app_dir }}/app/"
        delete: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.venv"
          - "--exclude=deploy"
          - "--exclude=__pycache__"
          - "--exclude=.env"

    - name: Ensure data directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}/data"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"

    - name: Fix app directory ownership
      ansible.builtin.file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Create venv
      become_user: "{{ app_user }}"
      ansible.builtin.command:
        cmd: python3 -m venv {{ app_dir }}/venv
        creates: "{{ app_dir }}/venv/bin/python"

    - name: Install Python dependencies
      become_user: "{{ app_user }}"
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/app/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"

    - name: Install env file
      ansible.builtin.template:
        src: env.j2
        dest: "{{ app_dir }}/app/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    - name: Install systemd service
      ansible.builtin.template:
        src: discord-scraper.service.j2
        dest: /etc/systemd/system/discord-scraper.service
        mode: "0644"
      notify: reload systemd

    - name: Install systemd timer
      ansible.builtin.template:
        src: discord-scraper.timer.j2
        dest: /etc/systemd/system/discord-scraper.timer
        mode: "0644"
      notify: reload systemd

    - name: Enable and start timer
      ansible.builtin.systemd:
        name: discord-scraper.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Trigger an immediate scrape run
      ansible.builtin.systemd:
        name: discord-scraper.service
        state: restarted

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
