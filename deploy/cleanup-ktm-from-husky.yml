# One-time cleanup: delete all KTM ad messages from the Husqvarna channel and
# wipe ktm-exc rows from the DB so the next scrape posts current KTM ads fresh
# to the new dedicated KTM channel.
#
# Run:
#   cd deploy
#   ansible-playbook cleanup-ktm-from-husky.yml                      # for real
#   ansible-playbook cleanup-ktm-from-husky.yml -e dry_run=true      # preview
#
# Caveat: webhooks cannot list channel history, so any "🚫 Gone:" pointer
# messages we previously posted are NOT deletable from this script — clean those
# up manually in Discord after running.

- name: Cleanup KTM ads from the Husqvarna channel (one-time)
  hosts: all
  become: true
  vars:
    app_dir: /opt/discord-scraper
    app_user: discord-scraper
    listing_key: ktm-exc
    dry_run: false
  vars_files:
    - secrets.yml

  tasks:
    - name: Stop scrape timer to avoid racing the cleanup
      ansible.builtin.systemd:
        name: discord-scraper.timer
        state: stopped

    - name: Sync cleanup script to the VM
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../scripts/"
        dest: "{{ app_dir }}/app/scripts/"

    - name: Fix script ownership
      ansible.builtin.file:
        path: "{{ app_dir }}/app/scripts"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Run cleanup script
      become_user: "{{ app_user }}"
      ansible.builtin.command:
        cmd: >-
          {{ app_dir }}/venv/bin/python
          {{ app_dir }}/app/scripts/cleanup_listing.py
          --listing-key {{ listing_key }}
          --webhook-url {{ discord_webhook_husqvarna_fe }}
          --db {{ app_dir }}/data/scraper.db
          {{ '--dry-run' if dry_run else '' }}
      register: cleanup_result
      changed_when: not dry_run

    - name: Show cleanup output
      ansible.builtin.debug:
        var: cleanup_result.stdout_lines

    - name: Restart scrape timer
      ansible.builtin.systemd:
        name: discord-scraper.timer
        state: started
