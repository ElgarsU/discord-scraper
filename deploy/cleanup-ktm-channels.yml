# One-time cleanup: deprecate the 4 KTM channels.
# For each KTM listing_key, delete the original ad messages from the matching
# KTM webhook (so the channels are empty/clean before you delete them in
# Discord) and remove those rows from the DB.
#
# Run:
#   cd deploy
#   ansible-playbook cleanup-ktm-channels.yml                      # for real
#   ansible-playbook cleanup-ktm-channels.yml -e dry_run=true      # preview
#
# After this completes, delete the KTM Discord channels manually, then remove
# the KTM entries from config.py / secrets.yml / env.j2 and redeploy.
#
# Caveat: webhooks cannot list channel history, so "🚫 Gone:" pointer messages
# we previously posted are NOT deletable from this script — they'll vanish when
# you delete the channel itself.

- name: Cleanup KTM channels (one-time)
  hosts: all
  become: true
  vars:
    app_dir: /opt/discord-scraper
    app_user: discord-scraper
    dry_run: false
    ktm_targets:
      - { key: "ss-ktm-exc",          webhook: "{{ discord_webhook_ktm_exc }}" }
      - { key: "auto24-ktm-exc",      webhook: "{{ discord_webhook_auto24_ktm_exc }}" }
      - { key: "mototehnika-ktm-exc", webhook: "{{ discord_webhook_mototehnika_ktm_exc }}" }
      - { key: "autoplius-ktm-exc",   webhook: "{{ discord_webhook_autoplius_ktm_exc }}" }
  vars_files:
    - secrets.yml

  tasks:
    - name: Stop scrape timer to avoid racing the cleanup
      ansible.builtin.systemd:
        name: discord-scraper.timer
        state: stopped

    - name: Sync cleanup script to the VM
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../scripts/"
        dest: "{{ app_dir }}/app/scripts/"

    - name: Fix script ownership
      ansible.builtin.file:
        path: "{{ app_dir }}/app/scripts"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Run cleanup for each KTM listing
      become_user: "{{ app_user }}"
      ansible.builtin.command:
        cmd: >-
          {{ app_dir }}/venv/bin/python
          {{ app_dir }}/app/scripts/cleanup_listing.py
          --listing-key {{ item.key }}
          --webhook-url {{ item.webhook }}
          --db {{ app_dir }}/data/scraper.db
          {{ '--dry-run' if dry_run else '' }}
      register: cleanup_results
      changed_when: not dry_run
      loop: "{{ ktm_targets }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Show cleanup output per listing
      ansible.builtin.debug:
        msg: "{{ item.item.key }}:\n{{ item.stdout }}"
      loop: "{{ cleanup_results.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    - name: Restart scrape timer
      ansible.builtin.systemd:
        name: discord-scraper.timer
        state: started
